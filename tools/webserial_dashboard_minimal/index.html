<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>nugget-fwlib Minimal Web Serial Dashboard</title>
<style>:root{--bg:#121417;--panel:#1b1f24;--line:#343b44;--red:#d32f2f;--gold:#ffd56a;--text:#f6f8fa;--muted:#aeb6c2;}body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Arial,sans-serif;}header{padding:18px 22px;background:#181b20;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px}.logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#e53935,#8b0000);display:grid;place-items:center;color:white;font-weight:800}main{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}button{background:var(--red);color:white;border:0;border-radius:12px;padding:10px 14px;font-weight:700;margin:4px;cursor:pointer}button.secondary{background:#2f363d}.status{font-size:30px;font-weight:800;color:var(--gold)}pre{height:360px;overflow:auto;background:#0d1117;border:1px solid var(--line);border-radius:12px;padding:12px;white-space:pre-wrap}input{background:#0d1117;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px;width:70%}@media(max-width:900px){main{grid-template-columns:1fr}}</style></head>
<body><header><div class="logo">RB</div><div><h1 style="margin:0">nugget-fwlib Dashboard</h1><div style="color:var(--muted)">Minimal Web Serial tester for GSA Tiny Text</div></div></header><main><section class="card"><h2>Connection</h2><button id="connect">Connect</button><button id="disconnect" class="secondary">Disconnect</button><p>Status: <span id="status" class="status">offline</span></p><h2>Commands</h2><button data-cmd="HELLO">HELLO</button><button data-cmd="STATUS">STATUS</button><button data-cmd="START">START</button><button data-cmd="STOP">STOP</button><button data-cmd="RESET">RESET</button><button data-cmd="TARE">TARE</button><button data-cmd="READ">READ</button><button data-cmd="DEMO ON">DEMO ON</button><button data-cmd="DEMO OFF">DEMO OFF</button><h2>Manual command</h2><input id="cmd" placeholder="Type command"><button id="send">Send</button></section><section class="card"><h2>Terminal</h2><pre id="term"></pre><button id="clear" class="secondary">Clear</button><button id="download" class="secondary">Download log</button></section></main>
<script>let port,reader,writer;const term=document.getElementById('term'),statusEl=document.getElementById('status');let log='';function add(s){const line=s.replace(/\r/g,'');log+=line;term.textContent+=line;term.scrollTop=term.scrollHeight}async function connect(){port=await navigator.serial.requestPort();await port.open({baudRate:9600});writer=port.writable.getWriter();reader=port.readable.getReader();statusEl.textContent='online';readLoop()}async function readLoop(){try{while(true){const{value,done}=await reader.read();if(done)break;add(new TextDecoder().decode(value))}}catch(e){add('\n[read stopped]\n')}}async function send(cmd){if(!writer){add('\n[not connected]\n');return}await writer.write(new TextEncoder().encode(cmd+'\r\n'));add('> '+cmd+'\n')}document.getElementById('connect').onclick=connect;document.getElementById('disconnect').onclick=async()=>{try{await reader.cancel();reader.releaseLock();writer.releaseLock();await port.close()}catch(e){}statusEl.textContent='offline'};document.querySelectorAll('button[data-cmd]').forEach(b=>b.onclick=()=>send(b.dataset.cmd));document.getElementById('send').onclick=()=>send(document.getElementById('cmd').value.trim());document.getElementById('clear').onclick=()=>{term.textContent='';log=''};document.getElementById('download').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([log],{type:'text/plain'}));a.download='nugget-fwlib-log.txt';a.click()};</script></body></html>
